<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitHub Pages 测试页</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px circle at 20% 10%, #f3f7ff, #ffffff 55%),
          radial-gradient(900px circle at 90% 20%, #fff3f3, #ffffff 60%);
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(720px, calc(100vw - 32px));
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        backdrop-filter: blur(10px);
      }
      h1 {
        font-size: 28px;
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 14px;
        color: rgba(0, 0, 0, 0.72);
        line-height: 1.6;
      }
      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #111827;
        color: #fff;
        font-size: 12px;
        letter-spacing: 0.02em;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        background: rgba(0, 0, 0, 0.05);
        padding: 2px 6px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">GitHub Pages Test</div>
      <h1>你好！页面已成功部署。</h1>
      <p>
        如果你在 GitHub Pages 上能看到这段文字，说明
        `index.html` 已从该仓库成功发布。
      </p>
      <p>
        当前文件：<code>index.html</code>
      </p>
    </main>
  </body>
</html>
